# FR2 n261 SA (+ optional PRS): 120 kHz SCS, 50 MHz channel bandwidth.
# Per 3GPP TS 38.104 Table 5.3.2-2 (FR2-1, 120 kHz): 50 MHz -> N_RB = 32 (transmission BW 46.08 MHz).
# OAI sample rate: 61.44 Msps (full) or 92.16 Msps (-E); analogue filter 50 MHz (get_samplerate_and_bw).
Active_gNBs = ( "gNB-SA-n261-50MHz");
# Asn1_verbosity, choice in: none, info, annoying
Asn1_verbosity = "none";

gNBs =
(
 {
    ////////// Identification parameters:
    gNB_ID    =  0xe00;

    cell_type =  "CELL_MACRO_GNB";

    gNB_name  =  "gNB-SA-n261-50MHz";

    // Tracking area code: 0x0000 and 0xfffe are reserved (TS 23.003).
    tracking_area_code  =  1;
    // NGAP: non-empty snssaiList per PLMN (TAISliceSupportList SIZE(1..1024) in NGSetupRequest).
    plmn_list = ({ mcc = 001; mnc = 01; mnc_length = 2; snssaiList = ({ sst = 1 }) });
    nr_cellid = 12345678L;


    tr_s_preference     = "local_mac"

    ////////// Physical parameters:

    #min_rxtxtime                                              = 6;

    pdsch_AntennaPorts_N1 = 1;
    pdsch_AntennaPorts_N2 = 1;
    pdsch_AntennaPorts_XP = 1;
    pusch_AntennaPorts    = 1;
    maxMIMO_layers        = 1;

    do_CSIRS              = 1;
    do_SRS                = 1;
    min_rxtxtime                                              = 6;
    enable_sdap                                               = 0;

    # CSI-RS periodicity in slots (120 kHz: 1 slot = 0.125 ms). 0 = auto; allowed 4,5,8,10,16,20,40,80,160,320.
    CSI_RS_periodicity_slots = 160;
    CSI_RS_slot_offset = 0;         # CSI-RS transmitted at offset slot within the periodicity
    SRS_periodicity_slots = 16;    # 0=auto, {4, 5, 8, 10, 16, 20, 32, 40, 64, 80, 160, 320, 640, 1280, 2560}.
 

    ssb_SubcarrierOffset                                      = 0;
    
    

    CSI_report_type = "cri_rsrp"; # "ssb_rsrp"; #(default), "ssb_sinr", "cri_rsrp".# "cri_rsrp";


	
    servingCellConfigCommon = (
    {
# spCellConfigCommon

      physCellId                                                    = 0;

# downlinkConfigCommon
    #frequencyInfoDL
      # SSB on FR2 GSCN raster: 24250.08 MHz + N*17.28 MHz (was 2071241, off raster).
      # 2071387 -> 27.53328 GHz, GSCN 22446 (band 261 / 120 kHz SSB range in OAI).
      absoluteFrequencySSB                                             = 2071387;
      dl_frequencyBand                                                 = 261;
      # Shifted by +146 NR-ARFCN (same as SSB) to keep delta SSB-PointA = 408 * 60 kHz
      dl_absoluteFrequencyPointA                                       = 2070979;
      #scs-SpecificCarrierList
        dl_offstToCarrier                                              = 0;
# subcarrierSpacing
# 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120  
        dl_subcarrierSpacing                                           = 3;
        dl_carrierBandwidth                                            = 32;
     #initialDownlinkBWP
      #genericParameters
        # RIV 8525 = full BWP 32 PRB @ RBstart 0 (max grid 275): PRBalloc_to_locationandbandwidth0(32,0,275)
        initialDLBWPlocationAndBandwidth                               = 8525;
# subcarrierSpacing
# 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120  
        initialDLBWPsubcarrierSpacing                                  = 3;
      #pdcch-ConfigCommon
        # TS 38.213 Table 13-8 (SSB 120 kHz, SCS 120 kHz): index 0..7 only. 12 is FR1-style and hits AssertFatal.
        initialDLBWPcontrolResourceSetZero                             = 0;
        initialDLBWPsearchSpaceZero                                    = 0;

  #uplinkConfigCommon 
     #frequencyInfoUL
      ul_frequencyBand                                              = 261;
      #scs-SpecificCarrierList
      ul_offstToCarrier                                             = 0;
# subcarrierSpacing
# 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120  
      ul_subcarrierSpacing                                          = 3;
      ul_carrierBandwidth                                           = 32;
      pMax                                                          = 20;
     #initialUplinkBWP
      #genericParameters
        initialULBWPlocationAndBandwidth                            = 8525;
# subcarrierSpacing
# 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120  
        initialULBWPsubcarrierSpacing                               = 3;
      #rach-ConfigCommon
        #rach-ConfigGeneric
          prach_ConfigurationIndex                                  = 52;
#prach_msg1_FDM
#0 = one, 1=two, 2=four, 3=eight
          prach_msg1_FDM                                            = 0;
          prach_msg1_FrequencyStart                                 = 0;
          zeroCorrelationZoneConfig                                 = 13;
          preambleReceivedTargetPower                               = -118;
#preamblTransMax (0...10) = (3,4,5,6,7,8,10,20,50,100,200)
          preambleTransMax                                          = 6;
#powerRampingStep
# 0=dB0,1=dB2,2=dB4,3=dB6
        powerRampingStep                                            = 1;
#ssb_perRACH_OccasionAndCB_PreamblesPerSSB_PR
        ssb_perRACH_OccasionAndCB_PreamblesPerSSB_PR                = 4;
#one (0..15) 4,8,12,16,...60,64
        ssb_perRACH_OccasionAndCB_PreamblesPerSSB                   = 7;
#ra_ContentionResolutionTimer
#(0..7) 8,16,24,32,40,48,56,64
        ra_ContentionResolutionTimer                                = 7;
        rsrp_ThresholdSSB                                           = 19;
#prach-RootSequenceIndex_PR
#1 = 839, 2 = 139
        prach_RootSequenceIndex_PR                                  = 2;
        prach_RootSequenceIndex                                     = 1;
        # SCS for msg1, can only be 15 for 30 kHz < 6 GHz, takes precendence over the one derived from prach-ConfigIndex
        #  
        msg1_SubcarrierSpacing                                      = 3,

# restrictedSetConfig
# 0=unrestricted, 1=restricted type A, 2=restricted type B
        restrictedSetConfig                                         = 0,

        msg3_DeltaPreamble                                          = 1;
        p0_NominalWithGrant                                         =-90;

# pucch-ConfigCommon setup :
# pucchGroupHopping
# 0 = neither, 1= group hopping, 2=sequence hopping
        pucchGroupHopping                                           = 0;
        hoppingId                                                   = 40;
        p0_nominal                                                  = -90;

      # SSB i with searchSpaceZero=0 (FR2 mux1 / Tab 13-12) maps SIB1 to slot (i mod 80). TDD 1.25ms period
      # has full-UL slots at period indices 8–9; i=48 → slot 48 → bad. Use i=56 (slot 56 → period 6, DL).
      ssb_PositionsInBurst_Bitmap                                   = 0x100000100010001L;

# ssb_periodicityServingCell
# 0 = ms5, 1=ms10, 2=ms20, 3=ms40, 4=ms80, 5=ms160, 6=spare2, 7=spare1 
      ssb_periodicityServingCell                                    = 1;

# dmrs_TypeA_position
# 0 = pos2, 1 = pos3
      dmrs_TypeA_Position                                           = 0;

# subcarrierSpacing
# 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120  
      subcarrierSpacing                                             = 3;


  #tdd-UL-DL-ConfigurationCommon
# subcarrierSpacing
# 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120  
      referenceSubcarrierSpacing                                    = 3;
      # pattern1 
      # dl_UL_TransmissionPeriodicity
      # 0=ms0p5, 1=ms0p625, 2=ms1, 3=ms1p25, 4=ms2, 5=ms2p5, 6=ms5, 7=ms10
      dl_UL_TransmissionPeriodicity                                 = 3;
      nrofDownlinkSlots                                             = 7;
      nrofDownlinkSymbols                                           = 6;
      nrofUplinkSlots                                               = 2;
      nrofUplinkSymbols                                             = 4;

      ssPBCH_BlockPower                                             = 10;
  }

  );


    # ------- SCTP definitions
    SCTP :
    {
        # Number of streams to use in input/output
        SCTP_INSTREAMS  = 2;
        SCTP_OUTSTREAMS = 2;
    };


     ////////// AMF parameters:
    amf_ip_address = ({ ipv4 = "192.168.70.132"; });

    NETWORK_INTERFACES :
    {
      GNB_IPV4_ADDRESS_FOR_NG_AMF              = "192.168.70.129/26";
      GNB_IPV4_ADDRESS_FOR_NGU                 = "192.168.70.129/26";
      GNB_PORT_FOR_S1U                         = 2152; # Spec 2152
    };


    #////////// MME parameters:
   # mme_ip_address = ({ ipv4 = "192.168.18.99"; });

   # ///X2
   # enable_x2 = "no";
   # t_reloc_prep      = 1000;      /* unit: millisecond */
   # tx2_reloc_overall = 2000;      /* unit: millisecond */
   # t_dc_prep         = 1000;      /* unit: millisecond */
   # t_dc_overall      = 2000;      /* unit: millisecond */
   # target_enb_x2_ip_address = ({ ipv4 = "192.168.18.199"; });

  #  NETWORK_INTERFACES :
 #   {
#
   #     GNB_IPV4_ADDRESS_FOR_S1_MME              = "192.168.18.198/24";
  #      GNB_IPV4_ADDRESS_FOR_S1U                 = "192.168.18.198/24";
  #      GNB_PORT_FOR_S1U                         = 2152; # Spec 2152
  #      GNB_IPV4_ADDRESS_FOR_X2C                 = "192.168.18.198/24";
  #      GNB_PORT_FOR_X2C                         = 36422; # Spec 36422
  #  };
 }
);

