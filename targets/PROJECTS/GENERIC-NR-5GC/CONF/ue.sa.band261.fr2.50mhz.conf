# nrUE libconfig: FR2 n261, 120 kHz, 50 MHz channel BW (32 PRB per TS 38.104 Table 5.3.2-2).
# Pair with: CONF/gnb0.sa.band261.fr2.50mhz.usrpx310.conf
#
# Set rf_freq to the same DL carrier centre (Hz) as the gNB (nr-softmodem -C), not necessarily the same as 66 PRB.
# ssb_start = 84 matches gNB absoluteFrequencySSB / dl_absoluteFrequencyPointA in that file (ssb_SubcarrierOffset = 0).
#
cells = (
  {
    ru_id = 0;
    band = 261;
    rf_freq = 27556320000L;
    rf_offset = 0;
    numerology = 3;
    N_RB_DL = 32;
    ssb_start = 84;
  }
);

rfsim=1;

uicc0 = {
  imsi = "001010000000002";
  key = "fec86ba6eb707ed08905757b1bb44b8f";
  opc= "C42449363BBAD02B66D16BC975D77CC1";
  dnn= "oai";
  nssai_sst=1;
}

telnetsrv = {
  listenport = 9091
  histfile = "~/history.telnetsrv"
}

rfsimulator :
{
    serveraddr = "127.0.0.1";
    serverport = "4043";
    options = ();
    modelname = "AWGN";
};

# Optional: merge PRS reception from CONF/ue.nr.prs.fr2.50mhz.conf (libconfig include if your build supports it).
