     # dl_UL_TransmissionPeriodicity                                 = 6;
     # nrofDownlinkSlots                                             = 7;
     # nrofDownlinkSymbols                                           = 6;
     # nrofUplinkSlots                                               = 2;
     # nrofUplinkSymbols                                             = 4;

 # 0=ms0p5, 1=ms0p625, 2=ms1, 3=ms1p25, 4=ms2, 5=ms2p5, 6=ms5, 7=ms10
    # dl_UL_TransmissionPeriodicity = 5;
    # nrofDownlinkSlots             = 3;
    # nrofDownlinkSymbols           = 10;
    # nrofUplinkSlots               = 1;
    # nrofUplinkSymbols             = 2;

    dl_UL_TransmissionPeriodicity                                 = 6;
      nrofDownlinkSlots                                             = 4;
      nrofDownlinkSymbols                                           = 6;
      nrofUplinkSlots                                               = 5;
      nrofUplinkSymbols                                             = 6;



  ssPBCH_BlockPower                                             = -25;
  }

  );


