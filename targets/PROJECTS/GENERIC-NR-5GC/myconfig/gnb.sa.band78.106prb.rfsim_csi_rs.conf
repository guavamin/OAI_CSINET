phaseTrackingRS = (
    {
      # --- Downlink PTRS (Aggressive for mmWave) ---
      dl_ptrsFreqDensity0_0    = 5;    # Trigger density Kp=2 even for small allocations
      dl_ptrsFreqDensity1_0    = 25;   # Trigger density Kp=4 (rarely used in high noise)
      dl_ptrsTimeDensity0_0    = 2;    # MCS threshold 1 (Low MCS still gets tracking)
      dl_ptrsTimeDensity1_0    = 5;    # MCS threshold 2
      dl_ptrsTimeDensity2_0    = 10;   # MCS threshold 3
      dl_ptrsEpreRatio_0       = 0;    # 0dB power offset
      dl_ptrsReOffset_0        = 0;

      # --- Uplink PTRS (Aggressive for mmWave) ---
      ul_ptrsFreqDensity0_0    = 5;
      ul_ptrsFreqDensity1_0    = 25;
      ul_ptrsTimeDensity0_0    = 2;
      ul_ptrsTimeDensity1_0    = 5;
      ul_ptrsTimeDensity2_0    = 10;
      ul_ptrsReOffset_0        = 0;
      ul_ptrsMaxPorts_0        = 1;
      ul_ptrsPower_0           = 0;
   }
);



